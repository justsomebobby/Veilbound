<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Veilbound">
<title>Veilbound</title>
<style>
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#08111f;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}#app{min-height:100dvh;width:100%;display:grid;place-items:center;padding:12px;background:radial-gradient(circle at top,#312e81,#111827 45%,#050816)}.screen{display:none;width:100%;max-width:430px;max-height:calc(100dvh - 24px);overflow:auto;border:1px solid #ffffff22;border-radius:24px;background:#0f172acc;padding:20px}.screen.on{display:block}h1{font-size:clamp(2.2rem,9vw,4rem);margin:0 0 10px;letter-spacing:-.05em}h2{font-size:2rem;margin:0 0 10px}p{color:#cbd5e1;font-size:1.05rem;line-height:1.4}.grid{display:grid;gap:14px;margin-top:20px}button{border:0;border-radius:18px;min-height:58px;padding:12px 16px;background:#374151;color:#fff;font:inherit;font-weight:850;box-shadow:inset 0 0 0 1px #ffffff22;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}.p{background:#7c3aed}.hud{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;margin-bottom:8px}.hud span{background:#111827;border:1px solid #ffffff22;border-radius:99px;padding:6px 9px}canvas{width:100%;aspect-ratio:16/9;background:#111827;border-radius:16px;border:1px solid #ffffff22;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}.small{min-height:42px;border-radius:999px;padding:8px 12px}.dot{display:inline-block;width:11px;height:11px;border-radius:50%;background:#22c55e;margin-left:3px}.off{background:#475569}#safeHub{position:fixed;left:10px;bottom:10px;z-index:10;min-height:40px;border-radius:999px;padding:8px 12px;background:#374151cc;font-size:13px}@media(min-width:700px){.screen{max-width:920px}.grid{grid-template-columns:1fr 1fr}#game{max-width:980px}.gamegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.gamegrid .row,.gamegrid .row3{margin-top:0}}
</style>
</head>
<body>
<button id="safeHub">Hub</button>
<main id="app">
<section id="menu" class="screen on"><h1>Veilbound</h1><p>Phase 2 side-scroller test build.</p><div class="grid"><button class="p" data-go="hub">Continue</button><button data-go="game">Play Level 1</button></div></section>
<section id="hub" class="screen"><h2>Hub</h2><p id="hubText">Menu and gameplay test.</p><div class="grid"><button class="p" data-go="game">Play Level 1</button><button data-go="menu">Main Menu</button><button data-go="custom">Customize</button><button data-go="gallery">Gallery</button></div></section>
<section id="custom" class="screen"><h2>Customize</h2><p>Customization placeholder. Art layers come later.</p><button data-go="hub">Back</button></section>
<section id="gallery" class="screen"><h2>Gallery</h2><p>Gallery placeholder. Scene controls come later.</p><button data-go="hub">Back</button></section>
<section id="game" class="screen"><div class="hud"><span>HP <b id="hp"></b></span><span>Energy <b id="en">0</b></span><span id="msg">Reach gate</span></div><canvas id="c" width="960" height="540"></canvas><div class="gamegrid"><div class="row"><button id="l">←</button><button id="r">→</button></div><div class="row3"><button class="p" id="j">Jump</button><button class="p" id="a">Atk</button><button id="d">Dash</button></div></div><p>Move, jump, attack red enemies, collect purple pickups, and reach the gold gate.</p><div class="row"><button class="small" id="reset">Restart</button><button class="small" data-go="hub">Hub</button></div></section>
</main>
<script>
(function(){
var c=document.getElementById('c'),x=c.getContext('2d'),key={l:0,r:0},cam=0,last=0,running=0,world=1800,gate=1690,p,enemies,orbs;
function q(id){return document.getElementById(id)}
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on')});(q(id)||q('hub')).classList.add('on');if(id==='game')start();else{running=0;key.l=0;key.r=0}}
function setMsg(t){q('msg').textContent=t}
function hud(){q('hp').innerHTML=[1,2,3].map(function(i){return '<i class="dot '+(i<=p.hp?'':'off')+'"></i>'}).join('');q('en').textContent=Math.floor(p.energy)}
function reset(){p={x:70,y:360,w:34,h:66,vx:0,vy:0,on:0,face:1,hp:3,energy:0,atk:0,inv:0,dash:0};enemies=[{x:500,y:388,w:44,h:42,hp:2,dir:-1},{x:930,y:388,w:44,h:42,hp:2,dir:1},{x:1240,y:250,w:46,h:34,hp:2,dir:-1,t:0,fly:1}];orbs=[{x:720,y:330,got:0},{x:1420,y:320,got:0}];cam=0;setMsg('Reach gate');hud();draw(0)}
function start(){reset();running=1;last=performance.now();requestAnimationFrame(loop)}
function rect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function jump(){if(p.on){p.vy=-620;p.on=0}}
function atk(){if(p.atk<=0){p.atk=.24;p.energy=Math.min(100,p.energy+4);hud()}}
function dash(){if(p.energy>=8){p.energy-=8;p.dash=.25;p.inv=.35;p.vx=360*p.face;hud()}}
function hurt(){if(p.inv>0)return;p.hp--;p.inv=1;p.energy=Math.min(100,p.energy+12);setMsg('Hit');hud();if(p.hp<=0)setTimeout(reset,600)}
function update(dt,t){p.atk=Math.max(0,p.atk-dt);p.inv=Math.max(0,p.inv-dt);p.dash=Math.max(0,p.dash-dt);var ax=key.r-key.l;if(ax){p.face=ax;p.vx=ax*(p.dash>0?330:230)}else if(p.dash<=0)p.vx*=.82;p.vy+=1500*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.y+p.h>=430){p.y=430-p.h;p.vy=0;p.on=1}else p.on=0;p.x=Math.max(20,Math.min(world-80,p.x));cam=Math.max(0,Math.min(world-960,p.x-330));var hit={x:p.face>0?p.x+p.w:p.x-48,y:p.y+12,w:48,h:32};enemies.forEach(function(o){if(o.hp<=0)return;if(o.fly){o.t+=dt;o.x+=o.dir*80*dt;o.y=245+Math.sin(o.t*3)*38;if(o.x<1150||o.x>1440)o.dir*=-1}else{o.x+=o.dir*65*dt;if(o.x<390||o.x>1040)o.dir*=-1}if(p.atk>0&&rect(hit,o)){o.hp--;p.energy=Math.min(100,p.energy+16);setMsg('Hit enemy');hud()}if(o.hp>0&&rect(p,o))hurt()});orbs.forEach(function(o){if(!o.got&&Math.hypot(p.x+17-o.x,p.y+33-o.y)<42){o.got=1;p.energy=Math.min(100,p.energy+25);setMsg('Pickup');hud()}});if(p.x>gate){setMsg('Gate reached');q('hubText').textContent='Level 1 cleared placeholder.'}}
function draw(t){x.clearRect(0,0,960,540);x.fillStyle='#111827';x.fillRect(0,0,960,540);x.fillStyle='#312e81';x.fillRect(-cam,430,world,110);x.fillStyle='#475569';for(var i=0;i<world;i+=90)x.fillRect(i-cam,430,55,8);x.fillStyle='#f59e0b';x.fillRect(gate-cam,330,48,100);orbs.forEach(function(o){if(o.got)return;x.fillStyle='#a78bfa';x.beginPath();x.arc(o.x-cam,o.y,12+Math.sin(t*7)*2,0,7);x.fill()});enemies.forEach(function(o){if(o.hp<=0)return;x.fillStyle=o.fly?'#f472b6':'#ef4444';if(o.fly){x.beginPath();x.ellipse(o.x-cam+23,o.y+17,23,17,0,0,7);x.fill()}else{x.fillRect(o.x-cam,o.y,o.w,o.h)}});if(p.atk>0){x.fillStyle='#fbbf2488';x.fillRect((p.face>0?p.x+p.w:p.x-48)-cam,p.y+12,48,32)}x.fillStyle=p.inv>0&&Math.floor(t*18)%2?'#38bdf888':'#38bdf8';x.fillRect(p.x-cam,p.y,p.w,p.h)}
function loop(n){if(!running)return;var dt=Math.min(.033,(n-last)/1000);last=n;update(dt,n/1000);draw(n/1000);requestAnimationFrame(loop)}
function hold(id,down,up){var b=q(id);b.onpointerdown=function(e){e.preventDefault();down()};b.onpointerup=b.onpointercancel=b.onpointerleave=function(e){e.preventDefault();if(up)up()}}
document.addEventListener('click',function(e){var go=e.target&&e.target.dataset&&e.target.dataset.go;if(go)show(go)});q('safeHub').onclick=function(){show('hub')};q('reset').onclick=reset;hold('l',function(){key.l=1},function(){key.l=0});hold('r',function(){key.r=1},function(){key.r=0});hold('j',jump);hold('a',atk);hold('d',dash);window.addEventListener('contextmenu',function(e){e.preventDefault()});document.addEventListener('selectstart',function(e){e.preventDefault()});document.addEventListener('dragstart',function(e){e.preventDefault()});document.addEventListener('gesturestart',function(e){e.preventDefault()});reset();
})();
</script>
</body>
</html>
