<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Veilbound Phase 2 Test</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#08111f;color:#fff;font-family:system-ui;touch-action:none}#wrap{min-height:100dvh;padding:12px;background:radial-gradient(circle at top,#312e81,#111827 45%,#050816)}.card{max-width:430px;margin:0 auto;border:1px solid #ffffff22;border-radius:24px;background:#0f172acc;padding:16px}.hud{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;margin-bottom:8px}.hud span{background:#111827;border:1px solid #ffffff22;border-radius:99px;padding:6px 9px}canvas{width:100%;aspect-ratio:16/9;background:#111827;border-radius:16px;border:1px solid #ffffff22}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}button{border:0;border-radius:16px;min-height:56px;background:#374151;color:#fff;font:inherit;font-weight:800}.p{background:#7c3aed}.small{min-height:42px;border-radius:999px;padding:8px 12px}.dot{display:inline-block;width:11px;height:11px;border-radius:50%;background:#22c55e;margin-left:3px}.off{background:#475569}</style></head><body><div id="wrap"><div class="card"><h1>Level 1 Test</h1><div class="hud"><span>HP <b id="hp"></b></span><span>Energy <b id="en">0</b></span><span id="msg">Reach gate</span></div><canvas id="c" width="960" height="540"></canvas><div class="row"><button id="l">←</button><button id="r">→</button></div><div class="row3"><button class="p" id="j">Jump</button><button class="p" id="a">Atk</button><button id="d">Dash</button></div><div class="row"><button class="small" onclick="reset()">Restart</button><button class="small" onclick="location.href='./'">Hub</button></div></div></div><script>let c=document.getElementById('c'),x=c.getContext('2d'),key={l:0,r:0},cam=0,last=0,run=1,world=1800,p,e,orb,gate=1690;function reset(){p={x:70,y:360,w:34,h:66,vx:0,vy:0,on:0,face:1,hp:3,en:0,atk:0,inv:0,dash:0};e=[{x:500,y:388,w:44,h:42,hp:2,dir:-1},{x:930,y:388,w:44,h:42,hp:2,dir:1},{x:1240,y:250,w:46,h:34,hp:2,dir:-1,t:0,fly:1}];orb=[{x:720,y:330,got:0},{x:1420,y:320,got:0}];msg('Reach gate');hud();draw(0)}function msg(t){document.getElementById('msg').textContent=t}function hud(){document.getElementById('hp').innerHTML=[1,2,3].map(i=>'<i class="dot '+(i<=p.hp?'':'off')+'"></i>').join('');document.getElementById('en').textContent=Math.floor(p.en)}function rect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function jump(){if(p.on){p.vy=-620;p.on=0}}function atk(){if(p.atk<=0){p.atk=.24;p.en=Math.min(100,p.en+4);hud()}}function dash(){if(p.en>=8){p.en-=8;p.dash=.25;p.inv=.35;p.vx=360*p.face;hud()}}function hurt(){if(p.inv>0)return;p.hp--;p.inv=1;p.en=Math.min(100,p.en+12);msg('Hit');hud();if(p.hp<=0)setTimeout(reset,600)}function update(dt,t){p.atk=Math.max(0,p.atk-dt);p.inv=Math.max(0,p.inv-dt);p.dash=Math.max(0,p.dash-dt);let ax=key.r-key.l;if(ax){p.face=ax;p.vx=ax*(p.dash>0?330:230)}else if(p.dash<=0)p.vx*=.82;p.vy+=1500*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.y+p.h>=430){p.y=430-p.h;p.vy=0;p.on=1}else p.on=0;p.x=Math.max(20,Math.min(world-80,p.x));cam=Math.max(0,Math.min(world-960,p.x-330));let hit={x:p.face>0?p.x+p.w:p.x-48,y:p.y+12,w:48,h:32};e.forEach(o=>{if(o.hp<=0)return;if(o.fly){o.t+=dt;o.x+=o.dir*80*dt;o.y=245+Math.sin(o.t*3)*38;if(o.x<1150||o.x>1440)o.dir*=-1}else{o.x+=o.dir*65*dt;if(o.x<390||o.x>1040)o.dir*=-1}if(p.atk>0&&rect(hit,o)){o.hp--;p.en=Math.min(100,p.en+16);msg('Hit enemy');hud()}if(o.hp>0&&rect(p,o))hurt()});orb.forEach(o=>{if(!o.got&&Math.hypot(p.x+17-o.x,p.y+33-o.y)<42){o.got=1;p.en=Math.min(100,p.en+25);msg('Pickup');hud()}});if(p.x>gate){msg('Gate reached')}}function draw(t){x.clearRect(0,0,960,540);x.fillStyle='#111827';x.fillRect(0,0,960,540);x.fillStyle='#312e81';x.fillRect(-cam,430,world,110);x.fillStyle='#475569';for(let i=0;i<world;i+=90)x.fillRect(i-cam,430,55,8);x.fillStyle='#f59e0b';x.fillRect(gate-cam,330,48,100);orb.forEach(o=>{if(o.got)return;x.fillStyle='#a78bfa';x.beginPath();x.arc(o.x-cam,o.y,12+Math.sin(t*7)*2,0,7);x.fill()});e.forEach(o=>{if(o.hp<=0)return;x.fillStyle=o.fly?'#f472b6':'#ef4444';o.fly?(x.beginPath(),x.ellipse(o.x-cam+23,o.y+17,23,17,0,0,7),x.fill()):x.fillRect(o.x-cam,o.y,o.w,o.h)});if(p.atk>0){x.fillStyle='#fbbf2488';x.fillRect((p.face>0?p.x+p.w:p.x-48)-cam,p.y+12,48,32)}x.fillStyle=p.inv>0&&Math.floor(t*18)%2?'#38bdf888':'#38bdf8';x.fillRect(p.x-cam,p.y,p.w,p.h)}function loop(n){if(!last)last=n;let dt=Math.min(.033,(n-last)/1000);last=n;update(dt,n/1000);draw(n/1000);requestAnimationFrame(loop)}function hold(id,down,up){let b=document.getElementById(id);b.onpointerdown=e=>{e.preventDefault();down()};b.onpointerup=b.onpointercancel=b.onpointerleave=e=>{e.preventDefault();if(up)up()}}hold('l',()=>key.l=1,()=>key.l=0);hold('r',()=>key.r=1,()=>key.r=0);hold('j',jump);hold('a',atk);hold('d',dash);reset();requestAnimationFrame(loop);</script></body></html>
